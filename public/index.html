<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>반도체 모니터링 대시보드 | SK Square</title>
  
  <!-- Chart.js 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-canvas: #FAF9F5;
      --color-coral: #CC785C;
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #666666;
      --color-border: #E5E5E5;
      --color-success: #2ECC71;
      --color-danger: #E74C3C;
      --color-neutral: #95A5A6;
      --color-info: #3498DB;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--color-canvas) 0%, #F5F1EB 100%);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ========== Header ========== */
    header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-left: 4px solid var(--color-coral);
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--color-text-primary);
    }

    header p {
      color: var(--color-text-secondary);
      font-size: 14px;
    }

    .header-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border: 1px solid var(--color-coral);
      background: white;
      color: var(--color-coral);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: var(--color-coral);
      color: white;
    }

    .btn.active {
      background: var(--color-coral);
      color: white;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-left: auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-neutral);
      animation: pulse 2s infinite;
    }

    .status-dot.active {
      background: var(--color-success);
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    /* ========== Main Grid ========== */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    @media (max-width: 1200px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    /* ========== Cards ========== */
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: var(--color-text-primary);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFF5F0;
      border-radius: 6px;
      color: var(--color-coral);
      font-size: 14px;
    }

    /* ========== Chart Container ========== */
    .chart-container {
      position: relative;
      height: 300px;
      margin-bottom: 20px;
    }

    .chart-container canvas {
      max-height: 100%;
    }

    /* ========== Stock Table ========== */
    .stock-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .stock-table thead {
      background: #FAFAFA;
      border-bottom: 2px solid var(--color-border);
    }

    .stock-table th {
      padding: 12px 8px;
      text-align: left;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .stock-table td {
      padding: 12px 8px;
      border-bottom: 1px solid var(--color-border);
    }

    .stock-table tr:hover {
      background: #FAFAFA;
    }

    .stock-name {
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .stock-code {
      color: var(--color-text-secondary);
      font-size: 12px;
    }

    .price {
      font-weight: 600;
      text-align: right;
    }

    .change {
      font-weight: 600;
      text-align: right;
    }

    .change.up {
      color: var(--color-danger);
    }

    .change.down {
      color: var(--color-success);
    }

    .change.neutral {
      color: var(--color-neutral);
    }

    .percent-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .percent-badge.up {
      background: #FFEBEE;
      color: var(--color-danger);
    }

    .percent-badge.down {
      background: #E8F5E9;
      color: var(--color-success);
    }

    .percent-badge.neutral {
      background: #F5F5F5;
      color: var(--color-neutral);
    }

    /* ========== Summary ========== */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .summary-item {
      background: #FAFAFA;
      padding: 16px;
      border-radius: 8px;
      border-left: 3px solid var(--color-coral);
    }

    .summary-label {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    /* ========== Loading ========== */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      color: var(--color-text-secondary);
    }

    .spinner {
      border: 3px solid var(--color-border);
      border-top: 3px solid var(--color-coral);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    /* ========== Error ========== */
    .error {
      background: #FFEBEE;
      border: 1px solid #FFCDD2;
      color: #C62828;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .error-icon {
      font-size: 20px;
    }

    /* ========== Footer ========== */
    footer {
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 12px;
      margin-top: 40px;
      padding: 20px;
    }

    /* ========== Responsive ========== */
    @media (max-width: 768px) {
      header {
        padding: 20px;
      }

      header h1 {
        font-size: 22px;
      }

      .stock-table {
        font-size: 12px;
      }

      .stock-table th,
      .stock-table td {
        padding: 10px 6px;
      }

      .summary {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div>
          <h1>📊 반도체 모니터링</h1>
          <p>SK Square 포트폴리오 실시간 추적</p>
        </div>
        <div class="status-indicator">
          <span class="status-dot active"></span>
          <span id="lastUpdate">방금 전</span>
        </div>
      </div>
      <div class="header-controls">
        <button class="btn active" onclick="refreshData()">🔄 새로고침</button>
        <button class="btn" onclick="exportData()">📥 내보내기</button>
        <button class="btn" onclick="toggleAutoRefresh()">⏱️ 자동 새로고침</button>
      </div>
    </header>

    <!-- Error Message -->
    <div id="errorContainer"></div>

    <!-- Main Dashboard -->
    <div class="dashboard">
      <!-- Chart Card -->
      <div class="card">
        <h2>
          <span class="card-icon">📈</span>
          변동률 비교
        </h2>
        <div class="chart-container">
          <canvas id="changeChart"></canvas>
        </div>
      </div>

      <!-- Price Chart -->
      <div class="card">
        <h2>
          <span class="card-icon">💹</span>
          시가총액 순위
        </h2>
        <div class="chart-container">
          <canvas id="marketCapChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Stock Table -->
    <div class="card">
      <h2>
        <span class="card-icon">📋</span>
        종목별 상세 정보
      </h2>
      <div id="tableContainer">
        <div class="loading">
          <div class="spinner"></div>
          <span>데이터 로딩 중...</span>
        </div>
      </div>
    </div>

    <!-- Summary Stats -->
    <div id="summaryContainer" style="margin-top: 30px;"></div>

    <!-- Footer -->
    <footer>
      <p>한국투자증권 Open API 기반 | 실시간 업데이트 | SK Square 대시보드</p>
    </footer>
  </div>

  <script>
    // ===== Global State =====
    let stockData = [];
    let autoRefreshInterval = null;
    let changeChart = null;
    let marketCapChart = null;

    // ===== Utility Functions =====
    function formatPrice(price) {
      return new Intl.NumberFormat('ko-KR').format(price);
    }

    function formatNumber(num) {
      return new Intl.NumberFormat('ko-KR').format(num);
    }

    function getChangeClass(change) {
      if (change > 0) return 'up';
      if (change < 0) return 'down';
      return 'neutral';
    }

    function getChangeSymbol(change) {
      if (change > 0) return '▲';
      if (change < 0) return '▼';
      return '−';
    }

    function updateLastUpdateTime() {
      const now = new Date();
      document.getElementById('lastUpdate').textContent = now.toLocaleTimeString('ko-KR');
    }

    function showError(message) {
      const container = document.getElementById('errorContainer');
      container.innerHTML = `
        <div class="error">
          <span class="error-icon">⚠️</span>
          <span>${message}</span>
        </div>
      `;
    }

    function clearError() {
      document.getElementById('errorContainer').innerHTML = '';
    }

    // ===== Data Fetching =====
    async function fetchStockData() {
      try {
        clearError();
        const response = await fetch('/api/semiconductors');
        const result = await response.json();

        if (!result.success) {
          throw new Error(result.error || '데이터 조회 실패');
        }

        stockData = result.data;
        updateUI();
        updateLastUpdateTime();
      } catch (error) {
        showError(`오류: ${error.message}`);
        console.error('Fetch error:', error);
      }
    }

    // ===== UI Update Functions =====
    function updateUI() {
      renderStockTable();
      renderCharts();
      renderSummary();
    }

    function renderStockTable() {
      const container = document.getElementById('tableContainer');
      
      if (!stockData.length) {
        container.innerHTML = '<div class="loading">데이터가 없습니다</div>';
        return;
      }

      const sortedData = [...stockData].sort((a, b) => (b.price || 0) - (a.price || 0));

      const html = `
        <table class="stock-table">
          <thead>
            <tr>
              <th>종목명</th>
              <th style="text-align: right;">현재가</th>
              <th style="text-align: right;">변동액</th>
              <th style="text-align: right;">변동률</th>
              <th style="text-align: right;">거래량</th>
              <th style="text-align: right;">거래대금</th>
            </tr>
          </thead>
          <tbody>
            ${sortedData.map((stock) => {
              const changeClass = getChangeClass(stock.change);
              const changePercent = (stock.changePercent || 0).toFixed(2);
              return `
                <tr>
                  <td>
                    <div class="stock-name">${stock.name}</div>
                    <div class="stock-code">${stock.code}</div>
                  </td>
                  <td class="price">${stock.price ? formatPrice(stock.price) : '−'}</td>
                  <td class="change ${changeClass}">
                    ${stock.change ? `${getChangeSymbol(stock.change)} ${formatPrice(Math.abs(stock.change))}` : '−'}
                  </td>
                  <td>
                    <span class="percent-badge ${changeClass}">
                      ${stock.change ? `${getChangeSymbol(stock.change)} ${changePercent}%` : '−'}
                    </span>
                  </td>
                  <td style="text-align: right; color: var(--color-text-secondary);">
                    ${stock.volume ? formatNumber(Math.floor(stock.volume / 100000)) + 'M' : '−'}
                  </td>
                  <td style="text-align: right; color: var(--color-text-secondary);">
                    ${stock.amount ? formatNumber(Math.floor(stock.amount / 100000000)) + 'B' : '−'}
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    function renderCharts() {
      const validData = stockData.filter(s => s.price);
      
      if (!validData.length) return;

      // Chart 1: 변동률 비교
      const ctx1 = document.getElementById('changeChart').getContext('2d');
      
      if (changeChart) {
        changeChart.destroy();
      }

      changeChart = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: validData.map(s => s.name),
          datasets: [{
            label: '변동률 (%)',
            data: validData.map(s => s.changePercent || 0),
            backgroundColor: validData.map(s => {
              const val = s.changePercent || 0;
              return val > 0 ? 'rgba(231, 76, 60, 0.8)' : 'rgba(46, 204, 113, 0.8)';
            }),
            borderRadius: 6,
            borderSkipped: false,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return context.parsed.y.toFixed(2) + '%';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: {
                callback: function(value) {
                  return value.toFixed(2) + '%';
                }
              }
            },
            x: {
              grid: { display: false }
            }
          }
        }
      });

      // Chart 2: 시가총액 순위
      const ctx2 = document.getElementById('marketCapChart').getContext('2d');
      
      if (marketCapChart) {
        marketCapChart.destroy();
      }

      const sortedByMarketCap = [...validData].sort((a, b) => (b.amount || 0) - (a.amount || 0));

      marketCapChart = new Chart(ctx2, {
        type: 'horizontalBar',
        data: {
          labels: sortedByMarketCap.map(s => s.name),
          datasets: [{
            label: '거래대금 (억원)',
            data: sortedByMarketCap.map(s => Math.floor((s.amount || 0) / 100000000)),
            backgroundColor: 'rgba(204, 120, 92, 0.8)',
            borderRadius: 6,
            borderSkipped: false,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return formatNumber(context.parsed.x) + '억원';
                }
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: {
                callback: function(value) {
                  return formatNumber(value) + '억';
                }
              }
            },
            y: {
              grid: { display: false }
            }
          }
        }
      });
    }

    function renderSummary() {
      const validData = stockData.filter(s => s.price);
      
      if (!validData.length) return;

      const avgChange = (validData.reduce((sum, s) => sum + (s.changePercent || 0), 0) / validData.length).toFixed(2);
      const totalVolume = validData.reduce((sum, s) => sum + (s.volume || 0), 0);
      const upCount = validData.filter(s => (s.change || 0) > 0).length;

      const container = document.getElementById('summaryContainer');
      container.innerHTML = `
        <div class="summary">
          <div class="summary-item">
            <div class="summary-label">평균 변동률</div>
            <div class="summary-value" style="color: ${avgChange > 0 ? 'var(--color-danger)' : 'var(--color-success)'}">
              ${getChangeSymbol(parseFloat(avgChange))} ${avgChange}%
            </div>
          </div>
          <div class="summary-item">
            <div class="summary-label">상승 종목</div>
            <div class="summary-value">${upCount} / ${validData.length}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">총 거래량</div>
            <div class="summary-value">${formatNumber(Math.floor(totalVolume / 1000000))}M</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">추적 종목</div>
            <div class="summary-value">${validData.length}개</div>
          </div>
        </div>
      `;
    }

    // ===== Control Functions =====
    async function refreshData() {
      const btn = event.target;
      btn.disabled = true;
      await fetchStockData();
      btn.disabled = false;
    }

    function toggleAutoRefresh() {
      const btn = event.target;
      
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
        btn.classList.remove('active');
      } else {
        autoRefreshInterval = setInterval(fetchStockData, 5000); // 5초마다 갱신
        btn.classList.add('active');
      }
    }

    function exportData() {
      if (!stockData.length) {
        alert('내보낼 데이터가 없습니다');
        return;
      }

      const csv = [
        ['종목명', '종목코드', '현재가', '변동액', '변동률(%)', '거래량', '거래대금'],
        ...stockData.map(s => [
          s.name,
          s.code,
          s.price || '−',
          s.change || '−',
          s.changePercent ? s.changePercent.toFixed(2) : '−',
          s.volume || '−',
          s.amount || '−'
        ])
      ].map(row => row.join(',')).join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `반도체_대시보드_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    // ===== Initialization =====
    document.addEventListener('DOMContentLoaded', () => {
      fetchStockData();
      // 매 10초마다 자동 새로고침 (선택사항)
      // autoRefreshInterval = setInterval(fetchStockData, 10000);
    });

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
    });
  </script>
</body>
</html>
