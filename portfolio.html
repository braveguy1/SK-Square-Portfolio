<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포트폴리오 관리 | SK Square</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-canvas: #FAF9F5;
      --color-coral: #CC785C;
      --color-text-primary: #1A1A1A;
      --color-text-secondary: #666666;
      --color-border: #E5E5E5;
      --color-success: #2ECC71;
      --color-danger: #E74C3C;
      --color-neutral: #95A5A6;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--color-canvas) 0%, #F5F1EB 100%);
      color: var(--color-text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-left: 4px solid var(--color-coral);
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--color-text-primary);
    }

    header p {
      color: var(--color-text-secondary);
      font-size: 14px;
    }

    .header-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border: 1px solid var(--color-coral);
      background: white;
      color: var(--color-coral);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: var(--color-coral);
      color: white;
    }

    .btn.active {
      background: var(--color-coral);
      color: white;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border-left: 4px solid var(--color-coral);
    }

    .summary-label {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .summary-value.positive {
      color: var(--color-danger);
    }

    .summary-value.negative {
      color: var(--color-success);
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: var(--color-text-primary);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFF5F0;
      border-radius: 6px;
      color: var(--color-coral);
      font-size: 14px;
    }

    .portfolio-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .portfolio-table thead {
      background: #FAFAFA;
      border-bottom: 2px solid var(--color-border);
    }

    .portfolio-table th {
      padding: 12px 8px;
      text-align: left;
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .portfolio-table td {
      padding: 12px 8px;
      border-bottom: 1px solid var(--color-border);
    }

    .portfolio-table tr:hover {
      background: #FAFAFA;
    }

    .stock-name {
      font-weight: 500;
      color: var(--color-text-primary);
    }

    .stock-code {
      color: var(--color-text-secondary);
      font-size: 12px;
    }

    .number-cell {
      text-align: right;
      font-family: 'Courier New', monospace;
    }

    .profit {
      font-weight: 600;
    }

    .profit.positive {
      color: var(--color-danger);
    }

    .profit.negative {
      color: var(--color-success);
    }

    .percent-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .percent-badge.positive {
      background: #FFEBEE;
      color: var(--color-danger);
    }

    .percent-badge.negative {
      background: #E8F5E9;
      color: var(--color-success);
    }

    .percent-badge.neutral {
      background: #F5F5F5;
      color: var(--color-neutral);
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      color: var(--color-text-secondary);
    }

    .spinner {
      border: 3px solid var(--color-border);
      border-top: 3px solid var(--color-coral);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: #FFEBEE;
      border: 1px solid #FFCDD2;
      color: #C62828;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chart-container {
      position: relative;
      height: 300px;
      margin-top: 20px;
    }

    .chart-container canvas {
      max-height: 100%;
    }

    footer {
      text-align: center;
      color: var(--color-text-secondary);
      font-size: 12px;
      margin-top: 40px;
      padding: 20px;
    }

    @media (max-width: 768px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .portfolio-table {
        font-size: 12px;
      }

      .portfolio-table th,
      .portfolio-table td {
        padding: 10px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div style="display: flex; justify-content: space-between; align-items: start;">
        <div>
          <h1>💼 포트폴리오 관리</h1>
          <p>보유 종목 잔고 및 손익 현황</p>
        </div>
      </div>
      <div class="header-controls">
        <button class="btn active" onclick="refreshPortfolio()">🔄 새로고침</button>
        <button class="btn" onclick="exportPortfolio()">📥 내보내기</button>
      </div>
    </header>

    <div id="errorContainer"></div>

    <!-- 요약 통계 -->
    <div id="summaryContainer" class="summary-grid"></div>

    <!-- 포트폴리오 테이블 -->
    <div class="card">
      <h2>
        <span class="card-icon">📊</span>
        보유 종목 현황
      </h2>
      <div id="tableContainer">
        <div class="loading">
          <div class="spinner"></div>
          <span>포트폴리오 로딩 중...</span>
        </div>
      </div>
    </div>

    <!-- 차트 -->
    <div class="card">
      <h2>
        <span class="card-icon">📈</span>
        평가액 분포
      </h2>
      <div class="chart-container">
        <canvas id="portfolioChart"></canvas>
      </div>
    </div>

    <footer>
      <p>Desktop/portfolio/portfolio.xlsx 기반 | 실시간 시세 연동</p>
    </footer>
  </div>

  <script>
    let portfolioData = [];
    let portfolioChart = null;

    function formatPrice(price) {
      return new Intl.NumberFormat('ko-KR').format(Math.floor(price));
    }

    function formatNumber(num) {
      return new Intl.NumberFormat('ko-KR').format(num);
    }

    function getProfitClass(value) {
      if (value > 0) return 'positive';
      if (value < 0) return 'negative';
      return 'neutral';
    }

    function getProfitSymbol(value) {
      if (value > 0) return '▲';
      if (value < 0) return '▼';
      return '−';
    }

    function showError(message) {
      const container = document.getElementById('errorContainer');
      container.innerHTML = `
        <div class="error">
          <span>⚠️</span>
          <span>${message}</span>
        </div>
      `;
    }

    function clearError() {
      document.getElementById('errorContainer').innerHTML = '';
    }

    async function fetchPortfolio() {
      try {
        clearError();
        const response = await fetch('/api/portfolio');
        const result = await response.json();

        if (!result.success) {
          throw new Error(result.error || '포트폴리오 조회 실패');
        }

        portfolioData = result.data;
        renderPortfolioTable(result.data);
        renderSummary(result.summary);
        renderChart(result.data);
      } catch (error) {
        showError(`오류: ${error.message}`);
        console.error('Fetch error:', error);
      }
    }

    function renderSummary(summary) {
      const container = document.getElementById('summaryContainer');

      const profitClass = getProfitClass(summary.totalProfitLoss);
      const profitSymbol = getProfitSymbol(summary.totalProfitLoss);

      container.innerHTML = `
        <div class="summary-card">
          <div class="summary-label">평가액</div>
          <div class="summary-value">${formatPrice(summary.totalEvaluationAmount)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">매입금액</div>
          <div class="summary-value">${formatPrice(summary.totalInvestmentAmount)}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">손익</div>
          <div class="summary-value ${profitClass}">
            ${profitSymbol} ${formatPrice(Math.abs(summary.totalProfitLoss))}
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-label">수익률</div>
          <div class="summary-value ${profitClass}">
            ${profitSymbol} ${summary.totalProfitLossPercent}%
          </div>
        </div>
        <div class="summary-card">
          <div class="summary-label">보유 종목</div>
          <div class="summary-value">${summary.holdingCount}개</div>
        </div>
      `;
    }

    function renderPortfolioTable(data) {
      const container = document.getElementById('tableContainer');

      if (!data.length) {
        container.innerHTML = `
          <div class="loading" style="height: 100px;">
            <span>보유 종목이 없습니다</span>
          </div>
        `;
        return;
      }

      const html = `
        <table class="portfolio-table">
          <thead>
            <tr>
              <th>종목명</th>
              <th style="text-align: right;">현재가</th>
              <th style="text-align: right;">보유수량</th>
              <th style="text-align: right;">매입가</th>
              <th style="text-align: right;">평가액</th>
              <th style="text-align: right;">손익</th>
              <th style="text-align: right;">수익률</th>
            </tr>
          </thead>
          <tbody>
            ${data
              .map((item) => {
                const profitClass = getProfitClass(item.profitLoss);
                const profitSymbol = getProfitSymbol(item.profitLoss);
                return `
                  <tr>
                    <td>
                      <div class="stock-name">${item.종목명}</div>
                      <div class="stock-code">${item.종목코드}</div>
                    </td>
                    <td class="number-cell">${formatPrice(item.currentPrice)}</td>
                    <td class="number-cell">${formatNumber(item.보유수량)}</td>
                    <td class="number-cell">${formatPrice(item.매입가)}</td>
                    <td class="number-cell">${formatPrice(item.evaluationAmount)}</td>
                    <td class="number-cell profit ${profitClass}">
                      ${profitSymbol} ${formatPrice(Math.abs(item.profitLoss))}
                    </td>
                    <td class="number-cell">
                      <span class="percent-badge ${profitClass}">
                        ${profitSymbol} ${item.profitLossPercent}%
                      </span>
                    </td>
                  </tr>
                `;
              })
              .join('')}
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    function renderChart(data) {
      if (!data.length) return;

      const ctx = document.getElementById('portfolioChart').getContext('2d');

      if (portfolioChart) {
        portfolioChart.destroy();
      }

      // 상위 10개 종목만 표시
      const topData = data.sort((a, b) => b.evaluationAmount - a.evaluationAmount).slice(0, 10);

      portfolioChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: topData.map((item) => item.종목명),
          datasets: [
            {
              data: topData.map((item) => item.evaluationAmount),
              backgroundColor: [
                'rgba(204, 120, 92, 0.8)',
                'rgba(231, 76, 60, 0.8)',
                'rgba(46, 204, 113, 0.8)',
                'rgba(52, 152, 219, 0.8)',
                'rgba(155, 89, 182, 0.8)',
                'rgba(230, 126, 34, 0.8)',
                'rgba(26, 188, 156, 0.8)',
                'rgba(149, 165, 166, 0.8)',
                'rgba(41, 128, 185, 0.8)',
                'rgba(142, 68, 173, 0.8)',
              ],
              borderWidth: 0,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
            },
            tooltip: {
              callbacks: {
                label: function (context) {
                  const value = formatPrice(context.parsed);
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const percent = ((context.parsed / total) * 100).toFixed(1);
                  return `${value} (${percent}%)`;
                },
              },
            },
          },
        },
      });
    }

    async function refreshPortfolio() {
      const btn = event.target;
      btn.disabled = true;
      await fetchPortfolio();
      btn.disabled = false;
    }

    function exportPortfolio() {
      if (!portfolioData.length) {
        alert('내보낼 데이터가 없습니다');
        return;
      }

      const csv = [
        ['종목명', '종목코드', '현재가', '보유수량', '매입가', '평가액', '손익', '수익률(%)'],
        ...portfolioData.map((item) => [
          item.종목명,
          item.종목코드,
          item.currentPrice,
          item.보유수량,
          item.매입가,
          item.evaluationAmount,
          item.profitLoss,
          item.profitLossPercent,
        ]),
      ]
        .map((row) => row.join(','))
        .join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `포트폴리오_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchPortfolio();
    });
  </script>
</body>
</html>
